name: PA Appeals Digest

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit state.json back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agent
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FORCE_DIGEST: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: |
          python -m src.main

      - name: Upload digest artifact (if created)
        uses: actions/upload-artifact@v4
        with:
          name: digest
          path: out/*.md
          if-no-files-found: ignore

      - name: Commit updated state (if changed)
        run: |
          if git status --porcelain | grep -E "data/state.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/state.json
            git commit -m "Update state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
